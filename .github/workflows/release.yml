name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Gate: wait for CI to pass on this commit (don't re-run, just watch).
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for CI workflow on commit ${{ github.sha }}..."
          # Poll until the CI run appears (it may take a few seconds to start)
          for i in $(seq 1 30); do
            RUN_ID=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&per_page=1" \
              --jq '.workflow_runs[0].id // empty')
            if [ -n "$RUN_ID" ]; then
              echo "Found CI run: $RUN_ID — watching..."
              gh run watch "$RUN_ID" --repo "${{ github.repository }}" --exit-status
              echo "✅ CI passed"
              exit 0
            fi
            echo "CI run not started yet (attempt $i/30), waiting 10s..."
            sleep 10
          done
          echo "::error::CI workflow never started for commit ${{ github.sha }}"
          exit 1

  # Verify that the git tag matches the workspace version.
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check tag matches workspace versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CORE_VER=$(grep '^version' koda-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          CLI_VER=$(grep '^version' koda-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          AST_VER=$(grep '^version' koda-ast/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          EMAIL_VER=$(grep '^version' koda-email/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$CORE_VER" ]; then
            echo "::error::Tag v$TAG does not match koda-core version $CORE_VER"
            exit 1
          fi
          if [ "$TAG" != "$CLI_VER" ]; then
            echo "::error::Tag v$TAG does not match koda-cli version $CLI_VER"
            exit 1
          fi
          if [ "$TAG" != "$AST_VER" ]; then
            echo "::error::Tag v$TAG does not match koda-ast version $AST_VER"
            exit 1
          fi
          if [ "$TAG" != "$EMAIL_VER" ]; then
            echo "::error::Tag v$TAG does not match koda-email version $EMAIL_VER"
            exit 1
          fi
          echo "✅ Tag v$TAG matches koda-core ($CORE_VER), koda-cli ($CLI_VER), koda-ast ($AST_VER), and koda-email ($EMAIL_VER)"

  build:
    name: Build ${{ matrix.target }}
    needs: [check-ci, verify-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} -p koda-cli
          cargo build --release --target ${{ matrix.target }} -p koda-ast
          cargo build --release --target ${{ matrix.target }} -p koda-email

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir koda-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/koda koda-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/koda-ast koda-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/koda-email koda-${{ matrix.target }}/
          cp README.md LICENSE koda-${{ matrix.target }}/
          tar czf koda-${{ matrix.target }}.tar.gz koda-${{ matrix.target }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir koda-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/koda.exe koda-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/koda-ast.exe koda-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/koda-email.exe koda-${{ matrix.target }}/
          cp README.md LICENSE koda-${{ matrix.target }}/
          7z a koda-${{ matrix.target }}.zip koda-${{ matrix.target }}/

      - uses: actions/upload-artifact@v5
        with:
          name: koda-${{ matrix.target }}
          path: |
            koda-${{ matrix.target }}.tar.gz
            koda-${{ matrix.target }}.zip
          if-no-files-found: ignore

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish koda-core
        run: cargo publish -p koda-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish koda-cli
        run: cargo publish -p koda-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish koda-ast
        run: cargo publish -p koda-ast
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish koda-email
        run: cargo publish -p koda-email
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: GitHub Release
    needs: build  # Only depends on build, not publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Get content between this version's header and the next ## header (or EOF)
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release_body.md
          # If extraction failed, use a fallback
          if [ ! -s release_body.md ]; then
            echo "Release v${VERSION}" > release_body.md
            echo "" >> release_body.md
            echo "See [CHANGELOG.md](https://github.com/lijunzh/koda/blob/main/CHANGELOG.md) for details." >> release_body.md
          fi
          echo "--- Extracted release notes ---"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip

  update-homebrew:
    name: Update Homebrew Tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "aarch64_mac=$(sha256sum artifacts/koda-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x86_64_mac=$(sha256sum artifacts/koda-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "aarch64_linux=$(sha256sum artifacts/koda-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x86_64_linux=$(sha256sum artifacts/koda-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update formula
        uses: actions/checkout@v5
        with:
          repository: lijunzh/homebrew-koda
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-koda

      - name: Write updated formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > homebrew-koda/Formula/koda.rb << 'FORMULA'
          class Koda < Formula
            desc "High-performance AI coding agent built in Rust"
            homepage "https://github.com/lijunzh/koda"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lijunzh/koda/releases/download/vVERSION_PLACEHOLDER/koda-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_MAC"
              else
                url "https://github.com/lijunzh/koda/releases/download/vVERSION_PLACEHOLDER/koda-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_MAC"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lijunzh/koda/releases/download/vVERSION_PLACEHOLDER/koda-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_LINUX"
              else
                url "https://github.com/lijunzh/koda/releases/download/vVERSION_PLACEHOLDER/koda-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_LINUX"
              end
            end

            def install
              bin.install "koda"
              bin.install "koda-ast"
              bin.install "koda-email"
            end

            test do
              assert_match "koda", shell_output("#{bin}/koda --version")
              assert_match "koda-ast", shell_output("#{bin}/koda-ast --version 2>&1", 1)
            end
          end
          FORMULA
          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-koda/Formula/koda.rb
          sed -i "s/SHA_AARCH64_MAC/${{ steps.sha.outputs.aarch64_mac }}/g" homebrew-koda/Formula/koda.rb
          sed -i "s/SHA_X86_64_MAC/${{ steps.sha.outputs.x86_64_mac }}/g" homebrew-koda/Formula/koda.rb
          sed -i "s/SHA_AARCH64_LINUX/${{ steps.sha.outputs.aarch64_linux }}/g" homebrew-koda/Formula/koda.rb
          sed -i "s/SHA_X86_64_LINUX/${{ steps.sha.outputs.x86_64_linux }}/g" homebrew-koda/Formula/koda.rb
          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' homebrew-koda/Formula/koda.rb

      - name: Push formula update
        run: |
          cd homebrew-koda
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/koda.rb
          git commit -m "Update koda to ${GITHUB_REF#refs/tags/}"
          git push
